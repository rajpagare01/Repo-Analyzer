spring:
  application:
    name: codepulse-repository-service

  datasource:
    url: jdbc:mysql://localhost:3306/codepulse?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Rajpagare@12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
